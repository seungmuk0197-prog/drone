<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드론 조종자 자격시험 통합 시스템</title>
    <style>
        :root { --primary-color: #1a365d; --error-color: #dc2626; --bg-color: #f7fafc; --border-color: #e2e8f0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: #2d3748; margin: 0; padding: 0; }
        header { background-color: var(--primary-color); color: white; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .q-card { background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .option-item { display: flex; align-items: center; padding: 10px; border: 1px solid #edf2f7; margin-bottom: 5px; border-radius: 5px; cursor: pointer; }
        .btn { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 5px; cursor: pointer; font-weight: bold; background: white; margin: 5px; }
    </style>
</head>
<body>
<header><h1>🚁 드론 자격시험 마스터 시스템</h1></header>
<div id="tabs-nav-bar" style="text-align:center; padding:10px;"></div>
<div class="container" id="main-pan-container"></div>

<script>
    const githubUsername = "seungmuk0197-prog"; 
    const githubRepo = "drone";           
    let activeTabId = "how_to_use";
    let wrongQuestionsMap = new Map();
    let currentMode = localStorage.getItem('drone_exam_mode') || 'practice';

    function initApp() {
        buildTabs();
        // 마지막 위치 복구
        let lastTab = localStorage.getItem('drone_last_active_tab') || 'how_to_use';
        restoreData(); // 데이터 복구
        
        if (lastTab.startsWith('exam') || lastTab.startsWith('trap')) {
            let prefix = lastTab.startsWith('exam') ? 'exam' : 'trap';
            let num = lastTab.replace(prefix, '');
            loadGithubFile(prefix, num);
        } else {
            switchTab(lastTab);
        }
    }

    function buildTabs() {
        const nav = document.getElementById("tabs-nav-bar");
        nav.innerHTML = `
            <button onclick="exportData()">📤 내보내기</button>
            <button onclick="importData()">📥 불러오기</button>
            <div id="menu-row"></div>
        `;
        let menuRow = document.getElementById("menu-row");
        // 메뉴 버튼 생성 생략... (이전 코드와 동일)
    }

    // ★ 데이터 압축 저장 함수 (오타 수정됨)
    function exportData() {
        const data = {
            answers: JSON.parse(localStorage.getItem('drone_saved_answers') || '{}'),
            wrong: JSON.parse(localStorage.getItem('drone_wrong_notes') || '{}')
        };
        const code = btoa(encodeURIComponent(JSON.stringify(data)));
        prompt("복사하세요:", code);
    }

    function importData() {
        const code = prompt("코드 붙여넣기:");
        if(!code) return;
        try {
            const data = JSON.parse(decodeURIComponent(atob(code)));
            localStorage.setItem('drone_saved_answers', JSON.stringify(data.answers));
            localStorage.setItem('drone_wrong_notes', JSON.stringify(data.wrong));
            location.reload();
        } catch(e) { alert("코드 오류 발생"); }
    }

    // 나머지 파싱 및 로직은 이전 코드와 동일하게 유지
    function switchTab(tabId) {
        activeTabId = tabId;
        localStorage.setItem('drone_last_active_tab', tabId);
        // ... (탭 전환 로직)
    }

    window.onload = initApp;
</script>
</body>
</html>
