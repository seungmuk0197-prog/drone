<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>드론 자격시험 마스터</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .btn { padding: 10px 20px; cursor: pointer; background: #1a365d; color: white; border: none; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h1>드론 시험 통합 시스템</h1>
    <div id="nav">
        <button class="btn" onclick="exportData()">📤 데이터 내보내기</button>
        <button class="btn" onclick="importData()">📥 데이터 불러오기</button>
        <button class="btn" onclick="clearData()" style="background:#dc2626;">❌ 초기화</button>
    </div>
    <div id="content"></div>

    <script>
        // 1. 데이터 내보내기 (안전한 Base64 압축)
        function exportData() {
            try {
                const data = {
                    answers: localStorage.getItem('drone_saved_answers') || '{}',
                    wrong: localStorage.getItem('drone_wrong_notes') || '{}'
                };
                const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                prompt("이 코드를 복사하세요:", code);
            } catch(e) { alert("데이터 추출 실패"); }
        }

        // 2. 데이터 불러오기 (오류 방지 로직 강화)
        function importData() {
            const code = prompt("코드를 입력하세요:");
            if(!code) return;
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
                localStorage.setItem('drone_saved_answers', decoded.answers);
                localStorage.setItem('drone_wrong_notes', decoded.wrong);
                alert("연동 완료! 페이지를 새로고침합니다.");
                location.reload();
            } catch(e) { 
                alert("코드 형식이 잘못되었습니다. 올바른 코드를 입력해주세요."); 
            }
        }

        // 3. 완전히 초기화 (화면이 안 뜰 때 사용)
        function clearData() {
            if(confirm("모든 데이터를 삭제하고 초기화할까요?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 페이지 로드 시 안전 확인
        window.onload = function() {
            // 여기에 기존 UI 생성 로직을 넣으시면 됩니다.
            document.getElementById('content').innerHTML = "시스템이 정상 작동 중입니다.";
        };
    </script>
</body>
</html>
